name: Continuous Integration

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * MON"

permissions:
  contents: read
  packages: read

env:
  # Fix for symfony/color detection. We know GitHub Actions can handle it
  ANSICON: 1
  #    CASTOR_CONTEXT: ci

jobs:
  check-dockerfiles:
    name: Check Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check php/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infrastructure/docker/services/php/Dockerfile

  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: setup-castor
        uses: castor-php/setup-castor@v1.0.0

      - uses: actions/checkout@v5

      - name: "Build and start the infrastructure"
        run: "castor start"

      - name: "Build and start the infrastructure"
        run: "CASTOR_CONTEXT=ci castor migrate"

      - name: 'Test the infrastructure is working'
        run: |
          set -e
          set -o pipefail
          curl --fail --insecure --silent -H "Host: 3dfollow.test" https://127.0.0.1 | grep "3D Follow"

      - name: "Check PHP coding standards"
        run: "castor qa:cs --dry-run"

      - name: "Run PHPStan"
        run: "castor qa:phpstan"

      - name: 'Run tests'
        run: "castor qa:phpunit"
